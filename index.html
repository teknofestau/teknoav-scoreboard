<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tekno Av – Yarışma Skorboardu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="scanlines"></div>
<div class="bg-glow"></div>

<!-- WINNER POPUP -->
<div id="winnerPopup" class="winner-popup hidden">
  <div class="winner-box">
    <div class="winner-rays"></div>
    <div class="winner-icon">🏆</div>
    <h1>SİSTEM KURTARILDI!</h1>
    <h2 id="winnerName"></h2>
    <p id="winnerTime"></p>
    <button onclick="document.getElementById('winnerPopup').classList.add('hidden')">KAPAT</button>
  </div>
</div>

<!-- ═══════════════════ TOPBAR ═══════════════════ -->
<header class="topbar">

  <!-- SOL: İki logo yan yana -->
  <div class="logo-left">
    <img id="imgAnadolu"   src="" alt="Anadolu Üniversitesi"/>
    <div class="logo-divider"></div>
    <img id="imgTeknofest" src="" alt="Teknofest Kulübü"/>
  </div>

  <!-- ORTA: Marka -->
  <div class="brand-center">
    <div class="brand-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#12E8FF" stroke-width="1.5" opacity="0.25"/>
        <circle cx="32" cy="32" r="18" stroke="#12E8FF" stroke-width="1.2" stroke-dasharray="4 3"/>
        <circle cx="32" cy="32" r="5" fill="#FF3D6A" opacity="0.95"/>
        <line x1="32" y1="6"  x2="32" y2="20" stroke="#12E8FF" stroke-width="2"/>
        <line x1="32" y1="44" x2="32" y2="58" stroke="#12E8FF" stroke-width="2"/>
        <line x1="6"  y1="32" x2="20" y2="32" stroke="#12E8FF" stroke-width="2"/>
        <line x1="44" y1="32" x2="58" y2="32" stroke="#12E8FF" stroke-width="2"/>
        <text x="23" y="37" font-size="10" fill="#FFCC40" font-family="monospace" font-weight="bold">&gt;_</text>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-title">TEKNO AV</div>
      <div class="brand-sub">
        <span class="dot red"></span>
        HACKER ENGELLE
        <span class="dot red"></span>
      </div>
      <div class="brand-tagline">CANLI SKORBOARD</div>
    </div>
  </div>

  <!-- SAĞ: Timer + durum -->
  <div class="timer-area">
    <div class="timer-block">
      <div class="timer-label" id="timerLabel">⏱ GEÇEN SÜRE</div>
      <div class="timer-value" id="timerValue">00:00:00</div>
    </div>
    <div class="refresh-status">
      <span class="refresh-dot" id="refreshDot"></span>
      <span id="refreshLabel">CANLI</span>
    </div>
  </div>

</header>

<!-- ═══════════════════ MAIN GRID ═══════════════════ -->
<main class="grid">

  <!-- SOL: LEADERBOARD -->
  <section class="card leaderboard">
    <div class="card-head">
      <div class="cols">
        <span>SIRA</span>
        <span>TAKIM ADI</span>
        <span>TAMAMLANAN GÖREVLER</span>
        <span>PUAN</span>
        <span>DURUM</span>
      </div>
    </div>
    <div class="rows" id="leaderboardRows">
      <div class="loading-msg">⏳ Veriler yükleniyor...</div>
    </div>
  </section>

  <!-- SAĞ: GÖREVLER + GRAFİK -->
  <aside class="side">
    <section class="card tasks">
      <div class="side-title">📋 GÖREVLER</div>
    </section>
    <section class="card chart-card">
      <div class="side-title">
        📊 ANLIK PUAN DURUMU
        <span class="last-update" id="lastUpdate"></span>
      </div>
      <div class="chart-wrap">
        <canvas id="scoreChart"></canvas>
      </div>
    </section>
  </aside>
</main>

<!-- ═══════════════════ TICKER ═══════════════════ -->
<footer class="ticker">
  <div class="ticker-badge">⚡ SON DAKİKA</div>
  <div class="ticker-track">
    <div class="ticker-text" id="tickerText">Skorboard yükleniyor...</div>
  </div>
</footer>

<script src="logos.js"></script>
<script src="script.js"></script>
</body>
</html>
